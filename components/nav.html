            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">

                    <li class="nav-item">

    <script>
        function configureNavigation() {
            const currentPath = window.location.pathname;
            const isIndexPage = currentPath.includes('index.html') || currentPath.endsWith('/') || currentPath.endsWith('/My-Portfolio');
            const isInPagesFolder = currentPath.includes('/pages/');

            const basePath = isInPagesFolder ? '../' : './';
            const pagesPath = isInPagesFolder ? './' : './pages/';

            const brandLink = document.getElementById('brand-link');
            if (brandLink) brandLink.href = basePath + 'index.html';

            const links = {
                home: document.getElementById('home-link'),
                about: document.getElementById('about-link'),
                experience: document.getElementById('experience-link'),
                skills: document.getElementById('skills-link'),
                education: document.getElementById('education-link'),
                projects: document.getElementById('projects-link'),
                resume: document.getElementById('resume-link'),
                contact: document.getElementById('contact-link')
            };

            if (links.home) links.home.href = basePath + 'index.html#about';
            if (links.about) links.about.href = basePath + 'index.html#about';
            if (links.experience) links.experience.href = basePath + 'index.html#experience';
            if (links.skills) links.skills.href = basePath + 'index.html#skills';
            if (links.education) links.education.href = basePath + 'index.html#education';
            if (links.projects) links.projects.href = pagesPath + 'projects.html';
            if (links.resume) links.resume.href = pagesPath + 'resume.html';
            if (links.contact) links.contact.href = pagesPath + 'contact.html';

            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));

            if (currentPath.includes('projects.html') && links.projects) {
                links.projects.classList.add('active');
            } else if (currentPath.includes('resume.html') && links.resume) {
                links.resume.classList.add('active');
            } else if (currentPath.includes('contact.html') && links.contact) {
                links.contact.classList.add('active');
            } else if ((isIndexPage || currentPath.includes('index.html')) && links.home) {
                links.home.classList.add('active');
            }
        }

        setTimeout(configureNavigation, 10);
    </script>
